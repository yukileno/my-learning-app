<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>足し算クイズ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>足し算クイズ</h1>
        <div id="quiz">
            <span id="num1"></span>
            <span>+</span>
            <span id="num2"></span>
            <span>=</span>
            <input type="number" id="answer" placeholder="答え">
        </div>
        <button id="checkBtn">答え合わせ</button>
        <button id="nextBtn">次の問題</button>
        <p id="result"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.js"></script>
    <script src="script.js"></script>
</body>
</html>
